site_name: K8s 學習筆記
site_description: Kubernetes 核心概念、Networking、Security & RBAC、Helm & GitOps
site_author: hcps52088
site_url: https://hcps52088.github.io/k8s-notes/

repo_name: hcps52088/k8s-notes
repo_url: https://github.com/hcps52088/k8s-notes

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 首頁: index.md
  - 第一章 核心架構: 01-core-architecture/index.md
  - 第二章 Networking: 02-networking/index.md
  - 第三章 Security & RBAC: 03-security-rbac/index.md
  - 第四章 Helm & GitOps: 04-helm-gitops/index.md
