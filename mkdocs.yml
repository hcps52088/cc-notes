site_name: K8s 學習筆記
site_description: Kubernetes 核心概念、Networking、Security & RBAC、Helm & GitOps
site_author: hcps52088
site_url: https://hcps52088.github.io/k8s-notes/

repo_name: hcps52088/k8s-notes
repo_url: https://github.com/hcps52088/k8s-notes

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - 首頁: index.md
  - 核心架構: 01-core-architecture/index.md
  - Networking: coming-soon.md
  - Security & RBAC: coming-soon.md
  - Helm & GitOps: coming-soon.md
