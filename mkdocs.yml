site_name: K8s 學習筆記
site_description: Kubernetes 核心概念、Networking、Security & RBAC、Helm & GitOps
site_author: hcps52088
site_url: https://hcps52088.github.io/k8s-notes/

repo_name: hcps52088/k8s-notes
repo_url: https://github.com/hcps52088/k8s-notes

theme:
  name: material
  language: zh-TW
  palette:
    scheme: slate
    primary: amber
    accent: orange
  font:
    text: Noto Sans TC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - toc.integrate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: 本頁目錄
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 首頁: index.md
  - 第一章 核心架構: 01-core-architecture/index.md
  - 第二章 Networking: 02-networking/index.md
  - 第三章 Security & RBAC: 03-security-rbac/index.md
  - 第四章 Helm & GitOps: 04-helm-gitops/index.md
